<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF转二维码 - 在线预览工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 PDF转二维码</h1>
            <p class="subtitle">上传PDF文件，生成二维码，扫码即可在线预览</p>
        </header>

        <main>
            <div class="upload-section">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" name="file" accept=".pdf" required>
                        <label for="fileInput" class="file-label">
                            <span class="file-icon">📎</span>
                            <span class="file-text">选择PDF文件</span>
                        </label>
                    </div>
                    <button type="submit" class="upload-btn" id="uploadBtn">
                        <span>上传并生成二维码</span>
                    </button>
                </form>
            </div>

            <div id="resultSection" class="result-section hidden">
                <div class="success-message">
                    <span class="success-icon">✅</span>
                    <span>上传成功！</span>
                </div>
                
                <div class="qrcode-container">
                    <h3>扫描二维码查看PDF</h3>
                    <div class="qrcode-wrapper">
                        <img id="qrcodeImage" src="" alt="二维码">
                    </div>
                    <div class="qrcode-actions">
                        <a id="downloadQrcode" href="#" download class="btn-download">下载二维码</a>
                        <a id="viewPdf" href="#" target="_blank" class="btn-view">在线预览</a>
                    </div>
                </div>

                <div class="info-box">
                    <p><strong>文件信息：</strong></p>
                    <p id="fileInfo"></p>
                    <p><strong>文件大小：</strong></p>
                    <p id="fileSize"></p>
                    <p><strong>访问链接：</strong></p>
                    <div class="url-container">
                        <p class="url-text" id="pdfUrl"></p>
                        <button id="copyUrl" class="btn-copy" title="复制链接">📋</button>
                    </div>
                </div>
            </div>

            <div id="errorSection" class="error-section hidden">
                <div class="error-message">
                    <span class="error-icon">❌</span>
                    <span id="errorText"></span>
                </div>
            </div>

            <div id="loadingSection" class="loading-section hidden">
                <div class="spinner"></div>
                <p>正在上传，请稍候...</p>
            </div>
        </main>

        <footer>
            <p>扫码即可在线查看PDF，无需下载，无需跳转</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultSection = document.getElementById('resultSection');
        const errorSection = document.getElementById('errorSection');
        const loadingSection = document.getElementById('loadingSection');
        const qrcodeImage = document.getElementById('qrcodeImage');
        const downloadQrcode = document.getElementById('downloadQrcode');
        const viewPdf = document.getElementById('viewPdf');
        const fileInfo = document.getElementById('fileInfo');
        const fileSize = document.getElementById('fileSize');
        const pdfUrl = document.getElementById('pdfUrl');
        const copyUrl = document.getElementById('copyUrl');
        const errorText = document.getElementById('errorText');

        // 文件选择时显示文件名
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const label = document.querySelector('.file-text');
                label.textContent = file.name;
            }
        });

        // 表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                showError('请先选择PDF文件');
                return;
            }

            // 检查文件大小（50MB）
            if (file.size > 50 * 1024 * 1024) {
                showError('文件大小不能超过50MB');
                return;
            }

            hideAll();
            showLoading();

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult(data);
                } else {
                    showError(data.error || '上传失败，请重试');
                }
            } catch (error) {
                showError('网络错误，请检查连接后重试');
                console.error('Error:', error);
            } finally {
                hideLoading();
            }
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showResult(data) {
            qrcodeImage.src = data.qrcode_url;
            downloadQrcode.href = data.qrcode_url;
            downloadQrcode.download = `${data.file_id}.png`;
            viewPdf.href = data.pdf_url;
            fileInfo.textContent = data.filename;
            fileSize.textContent = data.file_size ? formatFileSize(data.file_size) : '-';
            pdfUrl.textContent = data.pdf_url;
            
            resultSection.classList.remove('hidden');
        }

        // 复制链接功能
        copyUrl.addEventListener('click', function() {
            const url = pdfUrl.textContent;
            navigator.clipboard.writeText(url).then(function() {
                const originalText = copyUrl.textContent;
                copyUrl.textContent = '✓';
                copyUrl.style.background = '#28a745';
                setTimeout(function() {
                    copyUrl.textContent = originalText;
                    copyUrl.style.background = '';
                }, 2000);
            }).catch(function(err) {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制链接');
            });
        });

        function showError(message) {
            errorText.textContent = message;
            errorSection.classList.remove('hidden');
        }

        function showLoading() {
            loadingSection.classList.remove('hidden');
        }

        function hideLoading() {
            loadingSection.classList.add('hidden');
        }

        function hideAll() {
            resultSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            loadingSection.classList.add('hidden');
        }
    </script>
</body>
</html>
